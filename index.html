<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BioHacking Sound Lab</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1 class="logo-text">BioHacking <span class="neon-blue">Sound Lab</span></h1>
        </header>

        <nav class="main-nav">
            <button class="nav-btn active" data-tab="lab">ПРОТОКОЛИ</button>
            <button class="nav-btn" data-tab="rife">РАЙФ</button>
            <button class="nav-btn" data-tab="scanner">СКЕНЕР</button>
        </nav>

        <main class="content-area">
            <div id="lab" class="tab-content active">
                <div class="module-card unlocked" onclick="openProtocol('smoking')">
                    <div class="module-info">
                        <h4>Спиране на цигари</h4>
                        <p>Тета (4Hz) + 528Hz</p>
                    </div>
                    <span class="status-icon">▶</span>
                </div>
            </div>

            <div id="rife" class="tab-content">
                <div class="rife-grid">
                    <div class="rife-card" onclick="playFreq(432, 'Детокс')">
                        <span class="emoji">🧬</span>
                        <h4>Детокс</h4>
                        <small>432 Hz</small>
                    </div>
                    <div class="rife-card" onclick="playFreq(528, 'Регенерация')">
                        <span class="emoji">✨</span>
                        <h4>ДНК</h4>
                        <small>528 Hz</small>
                    </div>
                </div>
                <div id="rifeStatus" class="monitor">Избери честота</div>
            </div>

            <div id="scanner" class="tab-content">
                <canvas id="scannerCanvas"></canvas>
                <div class="freq-val"><span id="liveFreq">0</span> Hz</div>
                <p id="freqNote">Скенерът е в готовност...</p>
                <button class="btn neon-btn" id="toggleScanner">СТАРТ СКЕНЕР</button>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
